<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conhecimento do Dia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1612;--paper:#f6f1e9;--paper-dark:#ede7d9;--accent:#c4502a;--accent-soft:#f0d5c8;--gold:#9a7b2f;--gold-soft:#f0e8d0;--muted:#7a6f62;--serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:17px;line-height:1.8;min-height:100vh}
header{border-bottom:1px solid rgba(26,22,18,.1);padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(246,241,233,.95);backdrop-filter:blur(10px);z-index:100}
.logo{font-family:var(--serif);font-size:1.15rem;color:var(--ink)}
.logo em{color:var(--accent);font-style:italic}
.header-meta{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;justify-content:flex-end}
.badge{font-size:.68rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent-soft);background:var(--accent-soft);padding:3px 10px;border-radius:2rem;white-space:nowrap}
.date-label{font-size:.72rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}

/* Loading */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:1.5rem;text-align:center;padding:2rem}
.spinner{width:48px;height:48px;border:2px solid var(--paper-dark);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-family:var(--serif);font-size:1.4rem;color:var(--ink)}
.loading-sub{font-size:.9rem;color:var(--muted);max-width:260px;line-height:1.6}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin:0 3px;animation:bounce 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* Error */
#error{display:none;text-align:center;padding:4rem 2rem;min-height:60vh;flex-direction:column;align-items:center;justify-content:center;gap:1rem}
#error h2{font-family:var(--serif);font-size:1.5rem;color:var(--ink)}
#error p{color:var(--muted);font-size:.95rem;max-width:320px;line-height:1.6}
.retry-btn{margin-top:.5rem;padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:2rem;font-size:.875rem;font-weight:500;cursor:pointer;font-family:var(--sans)}
.retry-btn:hover{opacity:.9}

/* Content */
#conteudo{display:none;animation:fadeIn .7s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.hero{max-width:760px;margin:0 auto;padding:4rem 2rem 2.5rem;border-bottom:1px solid rgba(26,22,18,.08)}
.eyebrow{font-size:.72rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.eyebrow::before{content:'';display:inline-block;width:24px;height:1px;background:var(--muted)}
h1{font-family:var(--serif);font-size:clamp(1.8rem,4.5vw,2.75rem);line-height:1.2;color:var(--ink);margin-bottom:1.5rem;font-weight:700}
.divider{width:40px;height:3px;background:var(--accent);margin-bottom:1.5rem;border-radius:2px}
.hero-intro{font-size:1.07rem;color:#3d3530;line-height:1.85;max-width:640px}

article{max-width:760px;margin:0 auto;padding:3rem 2rem 5rem}
section{margin-bottom:3rem}
h2{font-family:var(--serif);font-size:1.32rem;font-weight:700;color:var(--ink);margin-bottom:1.1rem;padding-bottom:.6rem;border-bottom:1px solid rgba(26,22,18,.1)}
p{margin-bottom:1.1rem;color:#2e2822}
strong{color:var(--ink);font-weight:500}
em{font-style:italic}

.point{margin-bottom:2.2rem;padding-left:1.25rem;border-left:2px solid var(--accent-soft)}
.point-title{font-family:var(--serif);font-size:1.05rem;font-weight:700;color:var(--ink);margin-bottom:.5rem}

.box{border-radius:6px;padding:1.5rem 1.75rem;margin:2rem 0}
.box-label{font-size:.65rem;font-weight:500;letter-spacing:.13em;text-transform:uppercase;margin-bottom:.75rem}
.box-licao{background:rgba(196,80,42,.06);border:1px solid rgba(196,80,42,.15)}
.box-licao .box-label{color:var(--accent)}
.box-licao p{color:#3a1f14;margin:0;font-size:1.05rem;line-height:1.75}
.box-acao{background:var(--gold-soft);border:1px solid rgba(154,123,47,.2)}
.box-acao .box-label{color:var(--gold)}
.box-acao p{color:#332a10;margin:0;font-size:1.05rem;line-height:1.75}

blockquote{margin:2rem 0;padding:1.5rem 1.75rem;border-left:3px solid var(--gold);background:rgba(154,123,47,.04);border-radius:0 6px 6px 0}
blockquote p{font-family:var(--serif);font-size:1.1rem;font-style:italic;color:#3d3020;margin:0 0 .5rem;line-height:1.7}
blockquote cite{font-size:.82rem;color:var(--muted);font-style:normal;letter-spacing:.04em}

.recursos-grid{display:grid;gap:1rem}
.recurso-card{background:#fff;border:1px solid rgba(26,22,18,.1);border-radius:8px;padding:1rem 1.25rem;display:flex;gap:1rem;align-items:flex-start}
.recurso-icon{width:36px;height:36px;border-radius:6px;background:#f0ece3;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.recurso-tipo{font-size:.65rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.recurso-nome{font-weight:500;font-size:.95rem;color:var(--ink);margin-bottom:3px}
.recurso-desc{font-size:.85rem;color:var(--muted);line-height:1.55}

footer{max-width:760px;margin:0 auto;padding:2rem 2rem 4rem;border-top:1px solid rgba(26,22,18,.08);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.footer-text{font-size:.82rem;color:var(--muted);font-family:var(--serif);font-style:italic}
.refresh-btn{font-size:.78rem;color:var(--accent);background:transparent;border:1px solid var(--accent-soft);padding:6px 14px;border-radius:2rem;cursor:pointer;font-family:var(--sans);transition:background .2s}
.refresh-btn:hover{background:var(--accent-soft)}

@media(max-width:600px){
  header{padding:1rem 1.25rem}
  .hero,article{padding-left:1.25rem;padding-right:1.25rem}
  h1{font-size:1.75rem}
  .hero{padding-top:2.5rem}
  .date-label{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo">Conhecimento <em>do Dia</em></div>
  <div class="header-meta">
    <span class="badge" id="header-badge">Carregando...</span>
    <span class="date-label" id="header-date"></span>
  </div>
</header>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-title">Preparando seu conhecimento...</div>
  <div class="loading-sub">Gerando conteúdo personalizado para empreendedores</div>
  <div class="dots"><span></span><span></span><span></span></div>
</div>

<div id="error">
  <h2>Não foi possível carregar</h2>
  <p>Houve um problema ao gerar o conteúdo de hoje. Verifique sua conexão e tente novamente.</p>
  <button class="retry-btn" onclick="carregar()">Tentar novamente</button>
</div>

<div id="conteudo"></div>

<script>
const ICONES = { "Livro": "📖", "Podcast": "🎙️", "Ferramenta": "🛠️" };

function esc(str){ return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") }

function renderizar(d) {
  document.getElementById("header-badge").textContent = d.categoria || "Conhecimento";
  document.getElementById("header-date").textContent = d.data || "";

  const introducaoParas = (d.introducao || "").split(/\n\n+/).map(p => `<p>${esc(p)}</p>`).join("");

  const pontos = (d.pontos || []).map(p => `
    <div class="point">
      <div class="point-title">${esc(p.titulo)}</div>
      ${p.conteudo.split(/\n\n+/).map(par => `<p>${esc(par)}</p>`).join("")}
    </div>`).join("");

  const recursos = (d.recursos || []).map(r => `
    <div class="recurso-card">
      <div class="recurso-icon">${ICONES[r.tipo] || "📌"}</div>
      <div>
        <div class="recurso-tipo">${esc(r.tipo)}</div>
        <div class="recurso-nome">${esc(r.nome)}</div>
        <div class="recurso-desc">${esc(r.descricao)}</div>
      </div>
    </div>`).join("");

  document.getElementById("conteudo").innerHTML = `
    <div class="hero">
      <div class="eyebrow">${esc(d.categoria)}</div>
      <h1>${esc(d.titulo)}</h1>
      <div class="divider"></div>
      <div class="hero-intro">${introducaoParas}</div>
    </div>
    <article>
      <section>
        <h2>📖 Conteúdo de Hoje</h2>
        ${pontos}
      </section>
      <div class="box box-licao">
        <div class="box-label">💡 Lição do Dia</div>
        <p>${esc(d.licao)}</p>
      </div>
      <div class="box box-acao">
        <div class="box-label">⚡ Ação Imediata — Faça hoje</div>
        <p>${esc(d.acao)}</p>
      </div>
      <section>
        <h2>✍️ Citação do Dia</h2>
        <blockquote>
          <p>${esc(d.citacao)}</p>
          <cite>— ${esc(d.autor_citacao)}</cite>
        </blockquote>
      </section>
      <section>
        <h2>📚 Recursos Recomendados</h2>
        <div class="recursos-grid">${recursos}</div>
      </section>
    </article>
    <footer>
      <div class="footer-text">Seu conhecimento diário · ${esc(d.data)}</div>
      <button class="refresh-btn" onclick="carregar()">↻ Gerar novamente</button>
    </footer>`;

  document.getElementById("loading").style.display = "none";
  document.getElementById("conteudo").style.display = "block";
}

async function carregar() {
  document.getElementById("loading").style.display = "flex";
  document.getElementById("conteudo").style.display = "none";
  document.getElementById("error").style.display = "none";

  try {
    const resp = await fetch("/.netlify/functions/conteudo-do-dia");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    renderizar(data);
  } catch(e) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("error").style.display = "flex";
    console.error(e);
  }
}

carregar();
</script>
</body>
</html>
